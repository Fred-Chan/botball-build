            font-size: 1rem;

            border-color: var(--primary);

            border-radius: var(--radius);

            box-shadow: var(--shadow);
            transition: all 0.3s ease;
            border: 1px solid var(--border);

        let videos = videoData.videos;
        let currentYear = 'all';
        let searchTerm = '';

        function loadData() {
            document.getElementById('totalCount').textContent = videos.length;
            renderVideos();
        }

        function filterVideos() {
            let filtered = videos;

            if (currentYear !== 'all') {
                filtered = filtered.filter(v => v.year.toString() === currentYear);
            }

            if (searchTerm) {
                const term = searchTerm.toLowerCase();
                filtered = filtered.filter(v => 
                    v.title.toLowerCase().includes(term) ||
                    v.team.toLowerCase().includes(term) ||
                    v.description.toLowerCase().includes(term) ||
                    (v.keywords && v.keywords.some(k => k.toLowerCase().includes(term)))
                );
            }

            return filtered;
        }

        function renderVideos() {
            const filtered = filterVideos();
            const grid = document.getElementById('videoGrid');
            const emptyState = document.getElementById('emptyState');
            const resultsCount = document.getElementById('resultsCount');

            resultsCount.textContent = `显示 ${filtered.length} 个视频`;

            if (filtered.length === 0) {
                grid.innerHTML = '';
                emptyState.style.display = 'block';
                return;
            }

            emptyState.style.display = 'none';
            grid.innerHTML = filtered.map(video => `
                <article class="video-card">
                    ${video.imageUrl ? `<img class="card-image" src="${video.imageUrl}" alt="${video.title}" onerror="this.style.display='none'; this.nextElementSibling.style.display='flex';"><div class="card-image-placeholder" style="display:none;">🤖</div>` : '<div class="card-image-placeholder">🤖</div>'}
                    <div class="card-header">
                        <span class="year-badge ${video.year < 2026 ? 'older' : ''}">
                            ${video.year}
                        </span>
                        <span class="date-badge">${formatDate(video.date)}</span>
                    </div>
                    <div class="card-body">
                        <h3 class="card-title">${highlightText(video.title)}</h3>
                        ${video.team ? `<span class="team-badge">${highlightText(video.team)}</span>` : ''}
                        <p class="card-description">${highlightText(video.description)}</p>
                        ${video.keywords && video.keywords.length > 0 ? `
                            <div class="keywords">
                                ${video.keywords.slice(0, 4).map(k => `<span class="keyword-tag">${k}</span>`).join('')}
                            </div>
                        ` : ''}
                    </div>
                </article>
            `).join('');
        }

        function highlightText(text) {
            if (!searchTerm || !text) return text;
            const regex = new RegExp(`(${escapeRegex(searchTerm)})`, 'gi');
            return text.replace(regex, '<mark style="background: #fef08a; padding: 0 2px; border-radius: 2px;">$1</mark>');
        }

        function escapeRegex(string) {
            return string.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
        }

        function formatDate(dateStr) {
            if (!dateStr) return '';
            if (dateStr.length === 8) {
                return `${dateStr.slice(0, 4)}-${dateStr.slice(4, 6)}-${dateStr.slice(6, 8)}`;
            }
            return dateStr;
        }

        // Event Listeners
        document.getElementById('searchInput').addEventListener('input', (e) => {
            searchTerm = e.target.value.trim();
            renderVideos();
        });

        document.querySelectorAll('.filter-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                currentYear = btn.dataset.year;
                renderVideos();
            });
        });

        // Initialize
        loadData();
    </script>
